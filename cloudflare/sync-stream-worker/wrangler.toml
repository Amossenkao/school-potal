name = "school-portal-sync-stream"
main = "src/index.ts"
compatibility_date = "2026-02-25"
workers_dev = true

[durable_objects]
bindings = [
  { name = "SYNC_STREAM_HUB", class_name = "SyncStreamHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncStreamHub"]

[vars]
SYNC_STREAM_REPLAY_LIMIT = "300"
SYNC_STREAM_DEBUG_LOGS = "false"
